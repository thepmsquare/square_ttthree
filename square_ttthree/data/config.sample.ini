[GENERAL]
MODULE_NAME = square_ttthree

[ENVIRONMENT]
HOST_IP = 0.0.0.0
HOST_PORT = 8000
ALLOW_ORIGINS = ["*"]
# absolute path (mandatory only for http)
SSL_CRT_FILE_PATH = ssl.crt
SSL_KEY_FILE_PATH = ssl.key

[SQUARE_LOGGER]
LOG_FILE_NAME = square_ttthree
# | Log Level | Value |
# | --------- | ----- |
# | CRITICAL  | 50    |
# | ERROR     | 40    |
# | WARNING   | 30    |
# | INFO      | 20    |
# | DEBUG     | 10    |
# | NOTSET    | 0     |

LOG_LEVEL = 20
# absolute or relative path
LOG_PATH = logs
# number of backup log files to keep during rotation
# if backupCount is zero, rollover never occurs.
LOG_BACKUP_COUNT = 3
# json or human_readable
FORMATTER_CHOICE = json
ENABLE_REDACTION = True